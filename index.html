/* -------------------- ticker tape -------------------- */
function buildTape(){
  const tape=$("#tape");
  const items=["NIFTY","SENSEX","BANKNIFTY","RELIANCE","TCS","HDFCBANK","INFY","ICICIBANK","SBIN","TATAMOTORS","ADANIPOWER","SUZLON","AAPL","MSFT","NVDA","SPX","BTC","ETH","SOL","USDINR","GOLD","CRUDEOIL","BRENT"];
  function seg(){return items.map(t=>{const i=DB.map[t];if(!i)return"";
    return `<span class="tape-item"><span class="t">${t}</span><span class="p" data-tkr="${t}" data-field="pxr">${nf(i.px)}</span><span data-tkr="${t}" data-field="pct" data-color="1" class="${cls(chg(i))}"></span></span>`}).join("")}
  tape.innerHTML=seg()+seg();
}

/* -------------------- command bar UX -------------------- */
function buildSuggest(q){
  const box=$("#suggest");
  q=(q||"").trim().toUpperCase();
  if(!q){hideSuggest();return}
  const out=[];
  // function matches
  FUNCS.forEach(f=>{if(f.code.startsWith(q)||f.name.toUpperCase().includes(q))out.push({code:f.code,name:f.name,tag:"FUNCTION",cmd:f.code})});
  // security matches
  const toks=q.split(/\s+/);const last=toks[toks.length-1];
  DB.list.forEach(i=>{
    if(i.tkr.startsWith(last)||(i.name&&i.name.toUpperCase().includes(last))){
      out.push({code:i.tkr,name:i.name+(i.type!=="eq"?" · "+i.type.toUpperCase():""),tag:i.type==="eq"?(i.ccy==="USD"?"US EQ":"IN EQ"):i.type.toUpperCase(),cmd:i.tkr+(i.type==="eq"?" DES":" GP")});
    }
  });
  if(!out.length){hideSuggest();return}
  box.innerHTML=out.slice(0,9).map((o,k)=>`<div class="sug-row${k===0?' sel':''}" data-cmd="${o.cmd}"><span class="sug-code">${o.code}</span><span class="sug-name">${o.name}</span><span class="sug-tag">${o.tag}</span></div>`).join("");
  box.classList.add("on");
  $$(".sug-row",box).forEach(r=>r.onclick=()=>{run(r.getAttribute("data-cmd"))});
}
function hideSuggest(){const b=$("#suggest");if(b){b.classList.remove("on");b.innerHTML=""}}
function moveSel(dir){
  const box=$("#suggest");if(!box.classList.contains("on"))return;
  const rows=$$(".sug-row",box);let idx=rows.findIndex(r=>r.classList.contains("sel"));
  if(idx<0)idx=0;rows[idx].classList.remove("sel");
  idx=(idx+dir+rows.length)%rows.length;rows[idx].classList.add("sel");
  rows[idx].scrollIntoView({block:"nearest"});
}

/* -------------------- boot -------------------- */
function boot(){
  buildRail();buildTape();
  // restore persisted account (unencrypted profiles auto-load; encrypted wait for unlock in ACCT)
  try{const {id,prof}=currentProfile();if(!prof||!prof.enc)loadProfileById(id);}catch(e){}
  updateAcctBtn();
  const ab=$("#acct-btn");if(ab)ab.onclick=()=>run("ACCT");
  const cmd=$("#cmd");
  cmd.addEventListener("input",()=>buildSuggest(cmd.value));
  cmd.addEventListener("keydown",e=>{
    if(e.key==="Enter"){e.preventDefault();
      const sel=$("#suggest .sug-row.sel");
      if(sel&&$("#suggest").classList.contains("on"))run(sel.getAttribute("data-cmd"));
      else run(cmd.value);
    } else if(e.key==="ArrowDown"){e.preventDefault();moveSel(1)}
    else if(e.key==="ArrowUp"){e.preventDefault();moveSel(-1)}
    else if(e.key==="Escape"){cmd.value="";hideSuggest();cmd.blur()}
  });
  document.addEventListener("keydown",e=>{
    const ae=document.activeElement;const inField=ae&&(ae.tagName==="INPUT"||ae.tagName==="SELECT"||ae.tagName==="TEXTAREA");
    if(e.key==="/"&&!inField){e.preventDefault();cmd.focus();return;}
    if(!inField&&!e.ctrlKey&&!e.metaKey&&!e.altKey&&/^[a-zA-Z0-9]$/.test(e.key)){cmd.focus();cmd.value+=e.key.toUpperCase();buildSuggest(cmd.value);e.preventDefault();}
  });
  document.addEventListener("click",e=>{if(!e.target.closest(".cmdwrap"))hideSuggest()});
  // clock
  function clockTick(){const d=new Date();
    $("#clk").textContent=d.toLocaleTimeString("en-IN",{hour12:false})+" IST";
  }
  clockTick();setInterval(clockTick,1000);
  render();
  updateModeUI();
  updateStatusBar();
  buildNewsTicker();
  startLive();          // begins WS streaming + auto-refresh
  setInterval(tick,1200);   // sim tick keeps non-live instruments moving (open markets only)
  setInterval(paintLoop,500); // flush high-frequency WS updates to the DOM
  setInterval(updateStatusBar,20000); // exchange open/closed refresh
  setInterval(buildNewsTicker,180000); // refresh news ticker every 3 min
}
boot();
